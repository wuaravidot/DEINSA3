{% extends 'cobranza/base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-4">
        <div class="card shadow-lg border-0 p-4">
            <div class="text-center mb-4">
                <div class="display-6 text-primary mb-2">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>
                <h3 class="fw-bold text-dark">BIENVENIDO</h3>
                <p class="text-muted small text-uppercase fw-bold">Acceso al Sistema de Cobranza</p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="id_username" class="form-label small fw-bold">Nombre de Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" name="username" autofocus maxlength="150" required id="id_username" 
                               class="form-control bg-light border-start-0" placeholder="Ej: david_sanchez">
                    </div>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label small fw-bold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" name="password" required id="id_password" 
                               class="form-control bg-light border-start-0" placeholder="••••••••">
                    </div>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger py-2 small text-center mb-3">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Usuario o clave incorrectos.
                </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                    INGRESAR AL PANEL
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="text-muted extra-small">
                    Desarrollos e Inversiones, S.A. <br> 
                    &copy; 2026 - Control Administrativo
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
