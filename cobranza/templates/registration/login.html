<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Desarrollos e Inversiones, S.A.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
        .btn-primary { background-color: #2c3e50; border: none; }
        .btn-primary:hover { background-color: #1a252f; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">BIENVENIDO</h3>
            <p class="text-muted">Acceso al Sistema de Cobranza</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small text-uppercase fw-bold">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Ej: admin_david" required>
            </div>
            <div class="mb-3">
                <label class="form-label small text-uppercase fw-bold">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            
            {% if form.errors %}
                <div class="alert alert-danger py-2 small">Usuario o clave incorrectos.</div>
            {% endif %}

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">INGRESAR</button>
        </form>
    </div>
</body>
</html>
